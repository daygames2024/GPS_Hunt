<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPS Hunt — Game Lobby</title>
  <link rel="stylesheet" href="style.css" />
  <style>
	body { overflow-y: auto; }

	.lobby-wrap {
	  max-width: 540px;
	  margin: 0 auto;
	  padding: 2rem 1rem 5rem;
	  display: flex;
	  flex-direction: column;
	  gap: 1.5rem;
	}

	/* ── Game cards ──────────────────────────────────────────────── */
	#game-list {
	  display: flex;
	  flex-direction: column;
	  gap: 1rem;
	}

	.game-card {
	  background: var(--surface);
	  border: 1px solid var(--border);
	  border-radius: 1rem;
	  padding: 1.25rem;
	  display: flex;
	  flex-direction: column;
	  gap: .9rem;
	  transition: border-color .2s;
	}
	.game-card:hover { border-color: var(--accent); }
	.game-card-ended { opacity: .55; }

	.game-card-header {
	  display: flex;
	  justify-content: space-between;
	  align-items: flex-start;
	  gap: .75rem;
	}

	.game-card-title {
	  font-size: 1.1rem;
	  font-weight: 700;
	  color: var(--text);
	}

	.game-card-meta {
	  font-size: .78rem;
	  color: var(--muted);
	  margin-top: .2rem;
	}

	.game-card-info {
	  font-size: .85rem;
	  color: var(--muted);
	}

	/* ── Badges ──────────────────────────────────────────────────── */
	.game-badge {
	  font-size: .7rem;
	  font-weight: 700;
	  padding: .25rem .65rem;
	  border-radius: 99px;
	  white-space: nowrap;
	  flex-shrink: 0;
	  text-transform: uppercase;
	  letter-spacing: .05em;
	}
	.badge-active { background: #1b5e20; color: #a5d6a7; }
	.badge-ended  { background: var(--border); color: var(--muted); }

	/* ── Join button inside card ─────────────────────────────────── */
	.game-join-btn {
	  max-width: unset;
	  width: 100%;
	  padding: .75rem;
	}

	/* ── Empty / loading state ───────────────────────────────────── */
	.lobby-empty {
	  text-align: center;
	  padding: 3rem 1rem;
	  color: var(--muted);
	  display: flex;
	  flex-direction: column;
	  align-items: center;
	  gap: .75rem;
	}

	/* ── Divider ─────────────────────────────────────────────────── */
	.divider {
	  display: flex;
	  align-items: center;
	  gap: .75rem;
	  color: var(--muted);
	  font-size: .8rem;
	}
	.divider::before, .divider::after {
	  content: '';
	  flex: 1;
	  height: 1px;
	  background: var(--border);
	}
  </style>
</head>
<body>

<div class="lobby-wrap">

  <!-- Header -->
  <div style="text-align:center">
	<div style="font-size:3.5rem">🗺️</div>
	<h1>GPS Hunt</h1>
	<p>Join an active hunt or create your own.</p>
  </div>

  <!-- Create your own -->
  <a href="admin.html"
	 style="display:flex;align-items:center;justify-content:center;gap:.6rem;background:var(--accent);color:#000;font-weight:700;font-size:1rem;padding:.9rem 2rem;border-radius:.75rem;text-decoration:none;">
	⚙️ Create Your Own Hunt
  </a>

  <div class="divider">or join an existing game</div>

  <!-- Loading -->
  <p id="loading-msg" style="text-align:center;color:var(--muted);font-size:.9rem">
	🔄 Loading games…
  </p>

  <!-- Game list -->
  <div id="game-list"></div>

  <!-- Footer -->
  <div style="text-align:center;font-size:.78rem;color:var(--muted)">
	<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#43a047;margin-right:.4rem;animation:pulse 2s infinite"></span>
	Live — updates automatically
  </div>

  <!-- Admin link -->
  <div style="border-top:1px solid var(--border);padding-top:1.25rem;display:flex;flex-direction:column;align-items:center;gap:.5rem">
	<a href="manage.html" style="color:var(--muted);font-size:.8rem;text-decoration:none">
	  🗂️ Manage Active Games
	</a>
  </div>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="config.js"></script>
<script src="firebase.js"></script>
<script src="lobby.js"></script>
</body>
</html>
